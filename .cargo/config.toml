# 16 KB page size alignment for Android native libraries.
#
# Required by Google Play for any update targeting Android 15+ since 2025-11-01.
# Newer Android devices (Pixel 8+, recent Samsung) use 16 KB memory pages
# instead of 4 KB; .so libraries must be aligned accordingly or refuse to load.
#
# Cargokit (rust_builder) does not inject this flag, so we set it here. The
# flag is harmless on 32-bit targets (adds a few KB of padding) and on older
# 4 KB-page devices (ignored at runtime). Apple / desktop targets are not
# affected by this file.
#
# Verify after `make ship-android`:
#   unzip -p build/app/outputs/bundle/release/app-release.aab \
#     base/lib/arm64-v8a/librust_lib_app.so > /tmp/lib.so
#   readelf -lW /tmp/lib.so | grep LOAD
# Expected: Align 0x4000 (= 16384 = 16 KB) on LOAD segments.

[target.aarch64-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.armv7-linux-androideabi]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.x86_64-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]

[target.i686-linux-android]
rustflags = ["-C", "link-arg=-Wl,-z,max-page-size=16384"]
