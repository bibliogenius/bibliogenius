# Cargokit configuration for BiblioGenius
# This file configures how Cargokit builds the Rust library for mobile platforms

cargo:
  # For release builds, disable default features to avoid compiling the desktop binary
  release:
    extra_flags:
      - "--no-default-features"
  # Debug builds also need no-default-features for iOS/Android
  debug:
    extra_flags:
      - "--no-default-features"
  # Profile = iOS on-device dogfood (`flutter run --profile`): enable the account-sync
  # data leg on the STATIC cr-sqlite path (iOS forbids dlopen). Kept OFF of release
  # (ship stays clean) and debug (macOS dev uses the dynamic `crsqlite` path). Revert
  # with `git restore cargokit.yaml` after the dogfood.
  profile:
    extra_flags:
      - "--no-default-features"
      - "--features"
      - "account_sync,crsqlite-static"
