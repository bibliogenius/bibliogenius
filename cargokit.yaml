# Cargokit configuration for BiblioGenius
# This file configures how Cargokit builds the Rust library for mobile platforms

cargo:
  # Release builds disable default features (no desktop binary) and ship the
  # account-sync data leg on the STATIC cr-sqlite path (iOS forbids dlopen;
  # static linking is the cross-platform shipping mechanism). CRR-ification
  # stays a runtime opt-in gated on account enrollment, so users without an
  # account keep a plain SQLite database.
  release:
    extra_flags:
      - "--no-default-features"
      - "--features"
      - "account_sync,crsqlite-static"
  # Debug builds: same feature set as release, so day-to-day `flutter run`
  # shares the CRR-promoted database with shipped builds (once an account is
  # enrolled, a process without cr-sqlite cannot write through the crsql_*
  # triggers, and post-enrollment dogfooding needs debug to keep writing).
  # NOTE: the iOS Simulator has no vendored static archive (see build.rs);
  # debug on a real device, or vendor the sim archive before simulator work.
  debug:
    extra_flags:
      - "--no-default-features"
      - "--features"
      - "account_sync,crsqlite-static"
  # Profile = iOS on-device dogfood (`flutter run --profile`), same features
  # as release so profile runs exercise the shipped configuration.
  profile:
    extra_flags:
      - "--no-default-features"
      - "--features"
      - "account_sync,crsqlite-static"
